<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Management System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115; --card-bg: #1a1d24; --card-brown: #2a201d;
            --text-main: #e2e8f0; --text-muted: #94a3b8;
            --color-blue: #3b82f6; --color-red: #ef4444; --color-orange: #f59e0b;
            --color-green: #10b981; --color-purple: #8b5cf6;
        }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px;}
        .title::before { content: ''; display: block; width: 10px; height: 10px; background: var(--color-green); border-radius: 50%; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border-top: 4px solid transparent;}
        .kpi-card:nth-child(1) { border-top-color: var(--color-blue); }
        .kpi-card:nth-child(2) { border-top-color: var(--color-red); }
        .kpi-card:nth-child(3) { border-top-color: var(--color-orange); }
        .kpi-card:nth-child(4) { border-top-color: var(--color-green); }
        .kpi-card:nth-child(5) { border-top-color: var(--color-purple); }
        .kpi-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-top: 10px;}
        .kpi-val { font-size: 32px; font-weight: 800; margin-top: 5px; }
        
        .middle-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;}
        .bins-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; } 
        
        .bin-card { background: var(--card-brown); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between;}
        .bin-header { display: flex; justify-content: space-between; align-items: flex-start;}
        .bin-name { font-weight: 600; font-size: 16px;}
        .bin-loc { font-size: 12px; color: var(--text-muted); margin-top: 2px;}
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; border: 1px solid;}
        
        .fill-pct { font-size: 32px; font-weight: 800; margin: 15px 0 10px 0;}
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 10px;}
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        
        .bin-footer { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);}
        
        #map { height: 100%; min-height: 400px; border-radius: 10px; z-index: 1;}
        
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;}
        .chart-card { background: var(--card-bg); padding: 15px; border-radius: 10px; height: 250px;}
        .chart-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px;}
        
        #alerts-container { height: 200px; overflow-y: auto; }
        .alert-box { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; }
        .alert-critical { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--color-red); color: #fff; }
        .alert-warning { background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--color-orange); color: #fff; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--card-bg); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <div class="title" id="main-title">Dynamic Smart Waste Management - India</div>
        <div id="clock" style="color: var(--text-muted); font-size: 14px;">--</div>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-title">🗑️ Total Bins</div><div class="kpi-val" style="color: var(--color-blue)" id="kpi-tot">0</div></div>
        <div class="kpi-card"><div class="kpi-title">🚨 Full / Critical</div><div class="kpi-val" style="color: var(--color-red)" id="kpi-full">0</div></div>
        <div class="kpi-card"><div class="kpi-title">⚠️ Warning</div><div class="kpi-val" style="color: var(--color-orange)" id="kpi-warn">0</div></div>
        <div class="kpi-card"><div class="kpi-title">✅ Empty / OK</div><div class="kpi-val" style="color: var(--color-green)" id="kpi-ok">0</div></div>
        <div class="kpi-card"><div class="kpi-title">📊 Avg Fill Level</div><div class="kpi-val" style="color: var(--color-purple)"><span id="kpi-avg">0</span><span style="font-size:16px">%</span></div></div>
    </div>

    <div class="middle-grid">
        <div class="bins-grid" id="bins-container"></div>
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="chart-card">
            <div class="chart-title">Fill Level Trend — All Bins (%)</div>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">Current Fill Level Per Bin (%)</div>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">Collection Alerts</div>
            <div id="alerts-container"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // ডিফল্ট লোকেশন হিসেবে নিউ দিল্লি সেট করা হলো
        let currentLat = 28.6139;
        let currentLng = 77.2090;

        const map = L.map('map').setView([currentLat, currentLng], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: 'Map data © OpenStreetMap'
        }).addTo(map);
        
        // সার্চ বক্স কনফিগারেশন
        L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Search city (e.g. Mumbai, Kolkata)..." })
         .on('markgeocode', function(e) { 
             map.fitBounds(e.geocode.bbox); 
             
             // নতুন লোকেশন সেট করা
             currentLat = e.geocode.center.lat;
             currentLng = e.geocode.center.lng;
             
             document.getElementById('main-title').innerText = "Smart Waste Management - " + e.geocode.name.split(',')[0];

             // আগের ডেটা রিসেট করা
             trendDataHistory.labels = [];
             trendDataHistory.datasets = [];
             isFirstLoad = true;
             
             // নতুন লোকেশনের ডেটা কল করা
             fetchData();
         })
         .addTo(map);

        let markers = [];
        const ctxBar = document.getElementById('barChart').getContext('2d');
        let barChart = new Chart(ctxBar, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Fill %', data: [], backgroundColor: '#f59e0b', borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, grid: {color: '#333'} }, x: { grid: {display: false} } }, plugins: { legend: {display: false} } }
        });

        const ctxLine = document.getElementById('lineChart').getContext('2d');
        let trendDataHistory = { labels: [], datasets: [] };
        let lineChart = new Chart(ctxLine, {
            type: 'line',
            data: trendDataHistory,
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, grid: {color: '#333'} }, x: { grid: {display: false} } }, plugins: { legend: { position: 'top', labels: { boxWidth: 10, color: '#e2e8f0' } } }, elements: { point: { radius: 0 } } }
        });

        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#ec4899'];
        let isFirstLoad = true;

        async function fetchData() {
            try {
                // API-তে বর্তমান ম্যাপের লোকেশন পাঠানো হচ্ছে
                const response = await fetch(`/api/latest?lat=${currentLat}&lng=${currentLng}`);
                const data = await response.json();
                
                let timeStr = data.timestamp.split(' ')[1]; 
                document.getElementById('clock').innerText = data.timestamp;

                document.getElementById('kpi-tot').innerText = data.kpi.total;
                document.getElementById('kpi-full').innerText = data.kpi.full;
                document.getElementById('kpi-warn').innerText = data.kpi.warning;
                document.getElementById('kpi-ok').innerText = data.kpi.ok;
                document.getElementById('kpi-avg').innerText = data.kpi.avg_fill;

                const container = document.getElementById('bins-container');
                const alertsContainer = document.getElementById('alerts-container');
                container.innerHTML = '';
                alertsContainer.innerHTML = '';
                
                let chartLabels = [];
                let chartData = [];

                markers.forEach(m => map.removeLayer(m));
                markers = [];

                if (trendDataHistory.labels.length > 10) {
                    trendDataHistory.labels.shift();
                    trendDataHistory.datasets.forEach(ds => ds.data.shift());
                }
                trendDataHistory.labels.push(timeStr);

                data.bins.forEach((bin, index) => {
                    let colorCode = 'var(--color-green)';
                    let badgeColor = 'rgba(16, 185, 129, 0.2)';
                    
                    if (bin.status === 'FULL') { colorCode = 'var(--color-red)'; badgeColor = 'rgba(239, 68, 68, 0.2)'; }
                    else if (bin.status === 'MODERATE') { colorCode = 'var(--color-orange)'; badgeColor = 'rgba(245, 158, 11, 0.2)'; }

                    container.innerHTML += `
                        <div class="bin-card">
                            <div class="bin-header">
                                <div>
                                    <div class="bin-name">${bin.name}</div>
                                    <div class="bin-loc">📍 ${bin.location}</div>
                                </div>
                                <div class="badge" style="color: ${colorCode}; background: ${badgeColor}; border-color: ${colorCode}">${bin.status}</div>
                            </div>
                            <div>
                                <div class="fill-pct" style="color: ${colorCode}">${bin.fill_pct}%</div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${bin.fill_pct}%; background: ${colorCode};"></div></div>
                                <div class="bin-footer">
                                    <span>📏 Dist: ${bin.distance} cm</span>
                                    <span>🗑️ Depth: ${bin.depth} cm</span>
                                </div>
                            </div>
                        </div>
                    `;

                    let shortName = bin.name.split(' ')[0] + " " + (index+1);
                    chartLabels.push(shortName); 
                    chartData.push(bin.fill_pct);

                    if (isFirstLoad) {
                        trendDataHistory.datasets.push({
                            label: shortName, data: [bin.fill_pct], borderColor: colors[index % colors.length], borderWidth: 2, tension: 0.4
                        });
                    } else {
                        trendDataHistory.datasets[index].data.push(bin.fill_pct);
                    }

                    let markerColor = bin.status === 'FULL' ? 'red' : (bin.status === 'MODERATE' ? 'orange' : 'green');
                    let circleMarker = L.circleMarker([bin.lat, bin.lng], {
                        radius: 8, fillColor: markerColor, color: '#fff', weight: 1, opacity: 1, fillOpacity: 0.8
                    }).bindPopup(`<b>${bin.name}</b><br>Fill: ${bin.fill_pct}%`).addTo(map);
                    markers.push(circleMarker);

                    if (bin.status === 'FULL') {
                        alertsContainer.innerHTML += `<div class="alert-box alert-critical"><b>CRITICAL:</b> ${bin.name} at ${bin.fill_pct}% — Schedule pickup NOW!</div>`;
                    } else if (bin.status === 'MODERATE' && bin.fill_pct > 70) {
                        alertsContainer.innerHTML += `<div class="alert-box alert-warning"><b>WARNING:</b> ${bin.name} at ${bin.fill_pct}% — Pickup soon.</div>`;
                    }
                });

                if(alertsContainer.innerHTML === '') {
                    alertsContainer.innerHTML = `<div style="color: var(--color-green); padding: 15px; border: 1px solid var(--color-green); border-radius: 4px;">All bins within normal levels.</div>`;
                }

                barChart.data.labels = chartLabels;
                barChart.data.datasets[0].data = chartData;
                barChart.update();
                
                lineChart.update();
                isFirstLoad = false;

            } catch (error) { console.error("Error fetching data:", error); }
        }

        fetchData();
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
